name: Generate GitHub Metrics

# Renders an "overview + languages" stats card with lowlighter/metrics and
# publishes it as a static SVG to the `metrics-output` branch (mirroring how
# pacman.yml publishes to `output`). The README embeds it via
# raw.githubusercontent.com, so the stats never depend on a third-party render
# service (github-readme-stats.vercel.app) staying online.
on:
  schedule:
    # Refresh twice a day, offset from the pacman workflow.
    - cron: "30 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@v3.34
        with:
          # Falls back to the built-in Actions token so this runs with no setup.
          # Add a classic PAT as the METRICS_TOKEN secret (no scopes needed for
          # public stats) for the most reliable render and private-contribution counts.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          output_action: none
          config_timezone: America/New_York
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, makefile, powershell

      - name: Stage SVG for publishing
        run: |
          mkdir -p dist
          src="$(find . -name 'github-metrics.svg' -not -path './dist/*' | head -n1)"
          echo "Found SVG at: $src"
          cp "$src" dist/github-metrics.svg
          ls -la dist

      - name: Push SVG to the metrics-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: metrics-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
